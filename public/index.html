<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web SQL Query Interface</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    <div class="glass-container">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                </svg>
                <h1>SQL Query Runner</h1>
            </div>
            <p class="subtitle">Securely execute SELECT queries against your database.</p>
        </header>

        <main>
            <div class="editor-section">
                <div class="editor-header">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                    <span class="tab-title">query.sql</span>
                </div>
                <textarea id="sqlInput" placeholder="-- Type your SELECT query here...&#10;SELECT * FROM Players" spellcheck="false"></textarea>
            </div>

            <div class="controls">
                <button id="executeBtn" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    <span>Execute</span>
                </button>
            </div>

            <div class="result-section">
                <div class="result-header">
                    <h2>Result Set</h2>
                    <span id="recordCount" class="badge">0 rows</span>
                </div>
                <div id="loading" class="hidden">
                    <div class="spinner"></div>
                    Executing...
                </div>
                <div id="errorMsg" class="error-box hidden"></div>
                <div class="table-container">
                    <table id="resultTable" class="hidden">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
